{% extends "base.html" %}
{% block content %}
<div class="text-center mt-5">
    <h1 class="display-4 fw-bold text-primary">AI Disease Predictor</h1>
    <p class="lead text-muted mt-3">Advanced machine learning to predict health risks with explainable AI infrastructure.</p>
    <hr class="my-4 w-50 mx-auto">
    {% if not current_user.is_authenticated %}
        <a class="btn btn-primary btn-lg px-5 shadow-sm" href="{{ url_for('register') }}">Get Started</a>
    {% else %}
        <a class="btn btn-primary btn-lg px-5 shadow-sm" href="{{ url_for('dashboard') }}">Go to Dashboard</a>
    {% endif %}
</div>
{% endblock %}
